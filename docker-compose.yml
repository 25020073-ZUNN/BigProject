services:
  mysql:
    image: mysql:8.0
    container_name: auction-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: auction_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/Database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auction-tcp-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/auction_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
      DB_USER: root
      DB_PASSWORD: 123456
      SERVER_PORT: 5050
      JAVA_OPTS: -Dauction.public.host=localhost -Dauction.media.dir=/app/uploads/images
    ports:
      - "5050:5050"
      - "8081:8081"
    volumes:
      - uploaded_images:/app/uploads

volumes:
  mysql_data:
  uploaded_images:
